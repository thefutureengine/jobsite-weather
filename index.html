<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JobSite Weather"/>
<meta name="theme-color" content="#0a1520"/>
<meta name="description" content="Weather built for the trades. Trade-specific conditions, severe weather alerts, and jobsite safety ratings for contractors and field workers."/>
<meta name="google-site-verification" content="5WURXg5enJ7p6g_ku0-pwN_gqtmtYGCdoPOaWWz9gD4"/>
<meta name="robots" content="index, follow"/>
<link rel="canonical" href="https://jobsiteweather.app/"/>
<title>JobSite Weather · by StrickerCo</title>
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-32.png"/>
<link rel="shortcut icon" href="/icons/icon-32.png"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="preload" href="/js/app-bundle.js" as="script"/>
<link rel="preload" href="/css/app.css" as="style"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <div class="logo">JOBSITE <span>WEATHER</span></div>
      <div class="byline">Built for the trades</div>
    </div>
    <div class="topbar-right">
      <button class="notify-btn" id="settingsBtn" onclick="openSettings()" title="Settings">⚙</button>
      <div class="by-label">by StrickerCo</div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="locInput" placeholder="Enter ZIP code" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="numeric" maxlength="5"/>
      <button class="btn" onclick="doSearch()">Go</button>
      <button class="btn btn-ghost" onclick="useGPS()">📍 GPS</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="tradeSelect" onchange="onTradeChange()" style="flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;color:var(--text);font-family:'Barlow',sans-serif;-webkit-appearance:none;appearance:none;">
        <option value="general">General / All Trades</option>
        <option value="roofing">Roofing</option>
        <option value="concrete">Concrete / Masonry</option>
        <option value="electrical">Electrical</option>
        <option value="plumbing">Plumbing</option>
        <option value="hvac">HVAC</option>
        <option value="framing">Framing / Carpentry</option>
        <option value="painting">Painting</option>
        <option value="landscaping">Landscaping</option>
        <option value="excavation">Excavation / Grading</option>
        <option value="farming">Farming / Agriculture</option>
        <option value="gc">General Contractor</option>
        <option value="architect">Architect / Designer</option>
        <option value="inspector">Inspector</option>
        <option value="surveyor">Surveyor</option>
        <option value="solar">Solar Installation</option>
        <option value="demolition">Demolition</option>
      </select>
      <button id="projectPill" onclick="handleProjectTap()" style="flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.08em;padding:6px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;transform:translateZ(0);backface-visibility:hidden;">📋 PROJECT</button>
    </div>
  </div>

  <div class="locs-row" id="locsRow"></div>
  <div id="alertBanner" class="alert"></div>
  <div id="nwsAlerts"></div>

  <!-- NAV TABS -->
  <div class="nav-tabs" id="navTabs" style="display:none;">
    <button class="nav-tab active" onclick="switchTab('conditions')" id="tab-conditions">CONDITIONS</button>
    <button class="nav-tab" onclick="switchTab('forecast')" id="tab-forecast">FORECAST</button>
    <button class="nav-tab" onclick="switchTab('foreman')" id="tab-foreman">🔨 FOREMAN</button>
  </div>

  <div id="content"><div class="loading">Locating you</div></div>

  <div class="footer">JOBSITE WEATHER · by StrickerCo Solutions</div>
</div>

<!-- DAY MODAL -->
<div class="modal-overlay" id="dayModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalInner"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettingsOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="settingsInner"></div>
  </div>
</div>

<!-- FOREMAN MODAL -->
<div class="modal-overlay" id="foremanModal" onclick="closeForemanOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="foremanInner"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer"></div>

<script src="/js/app-bundle.js"></script>
</body>
</html>
